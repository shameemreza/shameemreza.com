[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Old domain redirects
[[redirects]]
  from = "https://shameem.dev/*"
  to = "https://shameemreza.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://shameem.blog/*"
  to = "https://shameemreza.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://shameem.me/*"
  to = "https://shameemreza.com/:splat"
  status = 301
  force = true

# Cache static assets aggressively
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
